mail:
  providers:
    - type: outlook_token
      enable: true
      label: Outlook Pool
      mode: graph
      imap_host: outlook.office365.com
      message_limit: 10
      mailboxes: |
        user1@outlook.com----password1----client_id_1----refresh_token_1
        user2@hotmail.com----password2----client_id_2----refresh_token_2
    - type: gmail
      enable: false
      label: Gmail Alias
      user: your@gmail.com
      app_password: your_gmail_app_password
      imap_host: imap.gmail.com
      imap_port: 993
      alias_length: 8
      message_limit: 10
  request_timeout: 30
  wait_timeout: 45
  wait_interval: 3

proxy:
  url: "socks5://127.0.0.1:1080"
  flaresolverr_url: ""

registration:
  threads: 3
  total: 10

login:
  mode: password
  password: ""

workspace:
  enabled: true
  ids:
    - "your-k12-workspace-uuid"
  route: request
  max_retries: 3
  retry_backoff_ms: 5000

sub2api:
  enabled: true
  output_file: "sub2api_bundle.json"

logging:
  level: INFO
  file: ""
